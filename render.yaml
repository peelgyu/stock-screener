# ───────────────────────────────────────────────────────────────
# RENDER 전용 설정 — 2026-05-01 Railway 마이그레이션 후 BACKUP 용도로만 유지
#
# 라이브 배포는 Railway로 이전됨. 이 파일은 Render 롤백 필요 시 사용:
#   - render.com Dashboard에서 Service 새로 만들고 이 파일 인식하면 자동 빌드
#   - 또는 백업 폴더(2026-05-01_22-09_RENDER_FINAL_pre-railway-migration)로 복원
#
# 활성 배포 설정:
#   - Procfile (Railway / Heroku 호환)
#   - railway.json (Railway 헬스체크·재시작 정책)
#   - .python-version (Python 3.12 강제)
# ───────────────────────────────────────────────────────────────
services:
  - type: web
    name: stock-screener
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
