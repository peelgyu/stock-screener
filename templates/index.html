<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Screener - 투자자 기준 분석</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* 헤더 */
        .header {
            text-align: center;
            padding: 30px 0 20px;
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .header p {
            color: #888;
            font-size: 0.85rem;
        }

        /* 검색바 */
        .search-box {
            display: flex;
            gap: 10px;
            margin: 24px 0;
        }
        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #2a2a3e;
            background: #1a1a2e;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            border-color: #7b2ff7;
        }
        .search-box input::placeholder {
            color: #555;
        }
        .search-box button {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #7b2ff7, #00d2ff);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .search-box button:hover { opacity: 0.85; }
        .search-box button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 로딩 */
        .loading {
            text-align: center;
            padding: 60px 0;
            display: none;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #2a2a3e;
            border-top-color: #7b2ff7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 에러 */
        .error-msg {
            text-align: center;
            color: #ff6b6b;
            padding: 20px;
            background: #2a1a1a;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
        }

        /* 결과 영역 */
        #results { display: none; }

        /* 종목 정보 카드 */
        .stock-card {
            background: linear-gradient(135deg, #1e1e3a, #2a1a3e);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #3a2a5e;
        }
        .stock-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .stock-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            color: #aaa;
            font-size: 0.85rem;
        }
        .stock-meta span {
            background: #2a2a3e;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* 종합 점수 */
        .overall-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid #2a2a3e;
        }
        .grade-circle {
            width: 100px; height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 2.5rem;
            font-weight: 800;
        }
        .grade-A { background: linear-gradient(135deg, #00c851, #00e676); color: #0a2a0a; }
        .grade-B { background: linear-gradient(135deg, #2196f3, #42a5f5); color: #0a1a2a; }
        .grade-C { background: linear-gradient(135deg, #ff9800, #ffb74d); color: #2a1a0a; }
        .grade-D { background: linear-gradient(135deg, #ff5722, #ff7043); color: #2a0a0a; }
        .grade-F { background: linear-gradient(135deg, #f44336, #e53935); color: #fff; }
        .overall-text {
            font-size: 1.1rem;
            color: #ccc;
        }
        .overall-detail {
            font-size: 0.9rem;
            color: #888;
            margin-top: 4px;
        }

        /* 투자자 카드 */
        .investor-card {
            background: #1a1a2e;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid #2a2a3e;
            overflow: hidden;
        }
        .investor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .investor-header:hover { background: #222240; }
        .investor-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .investor-icon {
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }
        .icon-buffett { background: linear-gradient(135deg, #4a148c, #7b1fa2); }
        .icon-graham { background: linear-gradient(135deg, #1a237e, #283593); }
        .icon-lynch { background: linear-gradient(135deg, #004d40, #00695c); }
        .icon-oneil { background: linear-gradient(135deg, #e65100, #f57c00); }
        .icon-fisher { background: linear-gradient(135deg, #b71c1c, #d32f2f); }
        .investor-name {
            font-weight: 600;
            font-size: 1rem;
        }
        .investor-sub {
            font-size: 0.8rem;
            color: #888;
        }
        .investor-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .pass-rate {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .rate-high { background: #0a3a0a; color: #4caf50; }
        .rate-mid { background: #3a3a0a; color: #ffeb3b; }
        .rate-low { background: #3a0a0a; color: #f44336; }
        .arrow {
            color: #666;
            transition: transform 0.3s;
            font-size: 0.8rem;
        }
        .arrow.open { transform: rotate(180deg); }

        /* 기준 테이블 */
        .criteria-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .criteria-list.open {
            max-height: 600px;
        }
        .criteria-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-top: 1px solid #1e1e35;
        }
        .criteria-item:hover { background: #1e1e35; }
        .criteria-name {
            font-size: 0.9rem;
            flex: 1;
        }
        .criteria-value {
            font-size: 0.85rem;
            color: #aaa;
            margin: 0 16px;
            text-align: right;
            min-width: 80px;
        }
        .badge {
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            min-width: 50px;
            text-align: center;
        }
        .badge-yes { background: #0a3a0a; color: #4caf50; }
        .badge-no { background: #3a0a0a; color: #f44336; }
        .badge-na { background: #2a2a2a; color: #666; }

        /* 진행 바 */
        .progress-bar {
            height: 4px;
            background: #2a2a3e;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        /* 안내 문구 */
        .disclaimer {
            text-align: center;
            color: #555;
            font-size: 0.75rem;
            padding: 20px 0;
            line-height: 1.6;
        }

        /* 빠른 검색 */
        .quick-search {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        .quick-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #2a2a3e;
            background: transparent;
            color: #aaa;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            border-color: #7b2ff7;
            color: #fff;
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.4rem; }
            .stock-name { font-size: 1.2rem; }
            .criteria-value { min-width: 60px; font-size: 0.8rem; }
            .search-box button { padding: 14px 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Stock Screener</h1>
            <p>유명 투자자 기준으로 종목을 분석합니다</p>
        </div>

        <div class="search-box">
            <input type="text" id="tickerInput" placeholder="티커 입력 (예: AAPL, MSFT, TSLA)" autocomplete="off">
            <button id="searchBtn" onclick="analyze()">분석</button>
        </div>

        <div class="quick-search">
            <button class="quick-btn" onclick="quickSearch('AAPL')">AAPL</button>
            <button class="quick-btn" onclick="quickSearch('MSFT')">MSFT</button>
            <button class="quick-btn" onclick="quickSearch('GOOGL')">GOOGL</button>
            <button class="quick-btn" onclick="quickSearch('TSLA')">TSLA</button>
            <button class="quick-btn" onclick="quickSearch('NVDA')">NVDA</button>
            <button class="quick-btn" onclick="quickSearch('AMZN')">AMZN</button>
            <button class="quick-btn" onclick="quickSearch('META')">META</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>데이터 분석 중...</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div id="results">
            <div class="stock-card" id="stockCard"></div>

            <div class="overall-card" id="overallCard"></div>

            <div id="investorCards"></div>

            <div class="disclaimer">
                Yahoo Finance 데이터 기반 | 투자 참고용이며 투자 권유가 아닙니다<br>
                재무제표는 가장 최근 분기 기준 | 실시간 주가는 15분 지연
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('tickerInput');
        const btn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const results = document.getElementById('results');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') analyze();
        });

        function quickSearch(ticker) {
            input.value = ticker;
            analyze();
        }

        async function analyze() {
            const ticker = input.value.trim().toUpperCase();
            if (!ticker) return;

            btn.disabled = true;
            loading.style.display = 'block';
            errorMsg.style.display = 'none';
            results.style.display = 'none';

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.error;
                    errorMsg.style.display = 'block';
                    return;
                }

                renderResults(data);
                results.style.display = 'block';
            } catch (err) {
                errorMsg.textContent = '서버 연결에 실패했습니다.';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function renderResults(data) {
            // 종목 정보
            document.getElementById('stockCard').innerHTML = `
                <div class="stock-name">${data.stock.name}</div>
                <div class="stock-meta">
                    <span>${data.stock.sector}</span>
                    <span>${data.stock.industry}</span>
                    <span>${data.stock.price}</span>
                    <span>시총 ${data.stock.marketCap}</span>
                </div>
            `;

            // 종합 점수
            const o = data.overall;
            document.getElementById('overallCard').innerHTML = `
                <div class="grade-circle grade-${o.grade}">${o.grade}</div>
                <div class="overall-text">${o.gradeText} (${o.rate}%)</div>
                <div class="overall-detail">${o.yes}/${o.total} 기준 통과</div>
            `;

            // 투자자별 카드
            const icons = { buffett: 'B', graham: 'G', lynch: 'L', oneil: 'O', fisher: 'F' };
            let cardsHTML = '';

            data.investors.forEach((inv, i) => {
                const rateClass = inv.rate >= 70 ? 'rate-high' : inv.rate >= 40 ? 'rate-mid' : 'rate-low';
                const progressColor = inv.rate >= 70 ? '#4caf50' : inv.rate >= 40 ? '#ffeb3b' : '#f44336';

                let criteriaHTML = '';
                inv.criteria.forEach(c => {
                    let badgeClass, badgeText;
                    if (c.passed === true) { badgeClass = 'badge-yes'; badgeText = 'YES'; }
                    else if (c.passed === false) { badgeClass = 'badge-no'; badgeText = 'NO'; }
                    else { badgeClass = 'badge-na'; badgeText = 'N/A'; }

                    criteriaHTML += `
                        <div class="criteria-item">
                            <div class="criteria-name">${c.name}</div>
                            <div class="criteria-value">${c.value}</div>
                            <div class="badge ${badgeClass}">${badgeText}</div>
                        </div>
                    `;
                });

                cardsHTML += `
                    <div class="investor-card">
                        <div class="investor-header" onclick="toggleCard(${i})">
                            <div class="investor-left">
                                <div class="investor-icon icon-${inv.icon}">${icons[inv.icon]}</div>
                                <div>
                                    <div class="investor-name">${inv.name}</div>
                                    <div class="investor-sub">${inv.sub}</div>
                                </div>
                            </div>
                            <div class="investor-right">
                                <span class="pass-rate ${rateClass}">${inv.yes}/${inv.total} (${inv.rate}%)</span>
                                <span class="arrow" id="arrow-${i}">&#9660;</span>
                            </div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${inv.rate}%; background: ${progressColor};"></div>
                        </div>
                        <div class="criteria-list" id="criteria-${i}">
                            ${criteriaHTML}
                        </div>
                    </div>
                `;
            });

            document.getElementById('investorCards').innerHTML = cardsHTML;
        }

        function toggleCard(index) {
            const list = document.getElementById(`criteria-${index}`);
            const arrow = document.getElementById(`arrow-${index}`);
            list.classList.toggle('open');
            arrow.classList.toggle('open');
        }
    </script>
</body>
</html>
