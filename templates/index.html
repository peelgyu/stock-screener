<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Screener - 투자자 기준 분석</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }

        .header { text-align: center; padding: 30px 0 20px; }
        .header h1 { font-size: 1.8rem; background: linear-gradient(135deg, #00d2ff, #7b2ff7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
        .header p { color: #888; font-size: 0.85rem; }

        .search-wrap { position: relative; margin: 24px 0; }
        .search-box { display: flex; gap: 10px; }
        .search-box input { flex: 1; padding: 14px 18px; border-radius: 12px; border: 2px solid #2a2a3e; background: #1a1a2e; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .search-box input:focus { border-color: #7b2ff7; }
        .search-box input::placeholder { color: #555; }
        .search-box button { padding: 14px 28px; border-radius: 12px; border: none; background: linear-gradient(135deg, #7b2ff7, #00d2ff); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
        .search-box button:hover { opacity: 0.85; }
        .search-box button:disabled { opacity: 0.5; cursor: not-allowed; }

        .autocomplete { position: absolute; top: 100%; left: 0; right: 70px; background: #1e1e3a; border: 1px solid #3a2a5e; border-radius: 12px; margin-top: 4px; z-index: 100; overflow: hidden; display: none; max-height: 400px; overflow-y: auto; }
        .autocomplete.show { display: block; }
        .ac-item { padding: 12px 16px; cursor: pointer; transition: background 0.15s; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a3e; gap: 8px; }
        .ac-item:last-child { border-bottom: none; }
        .ac-item:hover, .ac-item.selected { background: #2a2a4e; }
        .ac-name { font-size: 0.9rem; }
        .ac-sub { font-size: 0.72rem; color: #666; margin-top: 2px; }
        .ac-symbol { font-size: 0.8rem; color: #7b2ff7; font-weight: 600; }
        .ac-exchange { font-size: 0.7rem; color: #666; margin-left: 8px; }
        .ac-right { display: flex; align-items: center; gap: 6px; }

        .loading { text-align: center; padding: 60px 0; display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid #2a2a3e; border-top-color: #7b2ff7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg { text-align: center; color: #ff6b6b; padding: 20px; background: #2a1a1a; border-radius: 12px; margin: 20px 0; display: none; }

        #results { display: none; }

        /* 시장 방향 배너 */
        .market-banner { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 0.85rem; border: 1px solid #2a2a3e; background: #1a1a2e; gap: 12px; }
        .mb-left { display: flex; align-items: center; gap: 10px; }
        .mb-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .mb-up { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
        .mb-down { background: #f44336; box-shadow: 0 0 8px #f44336; }
        .mb-flat { background: #ffeb3b; box-shadow: 0 0 8px #ffeb3b; }
        .mb-label { font-weight: 600; }
        .mb-sub { font-size: 0.75rem; color: #888; }
        .mb-right { font-size: 0.75rem; color: #aaa; text-align: right; white-space: nowrap; }

        /* 한 줄 판정 카드 */
        .verdict-card { border-radius: 16px; padding: 20px 24px; margin-bottom: 20px; border: 2px solid; display: flex; gap: 18px; align-items: center; }
        .verdict-green { background: linear-gradient(135deg, #0a2a14, #0a3a1f); border-color: #4caf50; }
        .verdict-yellow { background: linear-gradient(135deg, #2a2810, #3a3815); border-color: #ffeb3b; }
        .verdict-red { background: linear-gradient(135deg, #2a0e0e, #3a1414); border-color: #f44336; }
        .verdict-badge { font-size: 1.5rem; font-weight: 800; padding: 12px 20px; border-radius: 12px; min-width: 120px; text-align: center; flex-shrink: 0; }
        .vb-green { background: #4caf50; color: #0a2a0a; }
        .vb-yellow { background: #ffeb3b; color: #2a2a0a; }
        .vb-red { background: #f44336; color: #fff; }
        .verdict-content { flex: 1; }
        .verdict-reasons { font-size: 0.85rem; color: #ddd; line-height: 1.7; }
        .verdict-reasons li { margin-bottom: 2px; }
        .verdict-warnings { font-size: 0.78rem; color: #ffb74d; margin-top: 6px; line-height: 1.6; }

        /* 데이터 경고 */
        .data-warning { background: #2a2410; border: 1px solid #4a3a10; color: #ffb74d; padding: 8px 14px; border-radius: 10px; margin-bottom: 16px; font-size: 0.75rem; }

        .stock-card { background: linear-gradient(135deg, #1e1e3a, #2a1a3e); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid #3a2a5e; }
        .stock-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .stock-ticker { font-size: 0.9rem; color: #7b2ff7; font-weight: 600; margin-left: 8px; }
        .stock-meta { display: flex; flex-wrap: wrap; gap: 12px; color: #aaa; font-size: 0.85rem; }
        .stock-meta span { background: #2a2a3e; padding: 4px 12px; border-radius: 20px; }

        /* 적정주가 카드 */
        .fv-card { background: #1a1a2e; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2a3e; }
        .fv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 12px; }
        .fv-box { background: #0f0f1a; border-radius: 10px; padding: 12px; text-align: center; }
        .fv-box-label { font-size: 0.7rem; color: #888; margin-bottom: 3px; }
        .fv-box-value { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .fv-box-sub { font-size: 0.7rem; color: #aaa; margin-top: 2px; }
        .fv-verdict { text-align: center; padding: 10px; margin-top: 12px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; }
        .fv-up { background: #0a2a14; color: #4caf50; }
        .fv-fair { background: #2a2a1a; color: #ffeb3b; }
        .fv-down { background: #2a1010; color: #f44336; }

        .section-title { font-size: 1.1rem; font-weight: 700; margin: 24px 0 12px; padding-left: 12px; border-left: 3px solid #7b2ff7; }

        .tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a3e; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 90px; padding: 11px 4px; text-align: center; cursor: pointer; background: #1a1a2e; color: #888; font-size: 0.78rem; font-weight: 600; border: none; transition: all 0.2s; }
        .tab-btn.active { background: #2a2a4e; color: #fff; }
        .tab-btn:hover:not(.active) { background: #222240; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 공포/탐욕 */
        .fg-card { background: #1a1a2e; border-radius: 16px; padding: 28px; margin-bottom: 20px; border: 1px solid #2a2a3e; text-align: center; }
        .fg-gauge-wrap { position: relative; width: 220px; height: 120px; margin: 0 auto 16px; overflow: hidden; }
        .fg-gauge-bg { width: 220px; height: 220px; border-radius: 50%; background: conic-gradient(#e53935 0deg, #ff9800 72deg, #ffeb3b 126deg, #66bb6a 180deg, #4caf50 234deg, #2e7d32 288deg, #1b5e20 360deg); mask: radial-gradient(circle at center, transparent 65px, black 66px); -webkit-mask: radial-gradient(circle at center, transparent 65px, black 66px); }
        .fg-needle { position: absolute; bottom: 5px; left: 50%; width: 3px; height: 80px; background: #fff; border-radius: 2px; transform-origin: bottom center; transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .fg-needle::after { content: ''; position: absolute; bottom: -5px; left: -5px; width: 13px; height: 13px; background: #fff; border-radius: 50%; }
        .fg-score { font-size: 2.8rem; font-weight: 800; margin: 8px 0 4px; }
        .fg-label { font-size: 1.1rem; font-weight: 600; }
        .fg-scale { display: flex; justify-content: space-between; font-size: 0.7rem; color: #888; margin-top: 4px; padding: 0 10px; max-width: 220px; margin-left: auto; margin-right: auto; }
        .fg-indicators { margin-top: 20px; text-align: left; }
        .fg-ind-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e1e35; }
        .fg-ind-item:last-child { border-bottom: none; }
        .fg-ind-name { font-size: 0.85rem; flex: 1; }
        .fg-ind-value { font-size: 0.85rem; color: #aaa; margin: 0 12px; }
        .fg-ind-bar-wrap { width: 80px; height: 6px; background: #2a2a3e; border-radius: 3px; overflow: hidden; }
        .fg-ind-bar { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
        .fg-ind-label { font-size: 0.75rem; color: #888; min-width: 70px; text-align: right; }

        /* 숏/롱 */
        .pos-card, .opt-card { background: #1a1a2e; border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid #2a2a3e; }
        .pos-sentiment { text-align: center; padding: 16px; margin-bottom: 16px; border-radius: 12px; }
        .pos-sentiment-label { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
        .pos-sentiment-detail { font-size: 0.85rem; color: #bbb; }
        .pos-section-title { font-size: 0.9rem; font-weight: 600; color: #aaa; margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid #2a2a3e; }
        .pos-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e1e35; font-size: 0.85rem; }
        .pos-item:last-child { border-bottom: none; }
        .pos-item-name { color: #ccc; flex: 1; }
        .pos-item-value { color: #fff; font-weight: 600; text-align: right; }

        /* 옵션 */
        .opt-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .opt-box { background: #0f0f1a; border-radius: 12px; padding: 16px; text-align: center; }
        .opt-box-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
        .opt-box-value { font-size: 1.3rem; font-weight: 700; }
        .opt-maxpain { background: #1e1e35; border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: center; }
        .opt-maxpain-label { font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }
        .opt-maxpain-value { font-size: 1.5rem; font-weight: 800; color: #7b2ff7; }
        .opt-maxpain-desc { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
        .opt-strike-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e1e35; font-size: 0.85rem; gap: 8px; }
        .opt-strike-item:last-child { border-bottom: none; }
        .opt-strike-price { font-weight: 700; min-width: 65px; }
        .opt-strike-oi { color: #aaa; min-width: 70px; text-align: right; }
        .opt-strike-desc { color: #888; font-size: 0.8rem; flex: 1; }
        .opt-strike-bar-wrap { width: 60px; height: 6px; background: #2a2a3e; border-radius: 3px; overflow: hidden; min-width: 60px; }
        .opt-strike-bar { height: 100%; border-radius: 3px; }

        /* 종합 점수 */
        .overall-card { background: #1a1a2e; border-radius: 16px; padding: 28px; text-align: center; margin-bottom: 20px; border: 1px solid #2a2a3e; }
        .grade-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 2.5rem; font-weight: 800; }
        .grade-A { background: linear-gradient(135deg, #00c851, #00e676); color: #0a2a0a; }
        .grade-B { background: linear-gradient(135deg, #2196f3, #42a5f5); color: #0a1a2a; }
        .grade-C { background: linear-gradient(135deg, #ff9800, #ffb74d); color: #2a1a0a; }
        .grade-D { background: linear-gradient(135deg, #ff5722, #ff7043); color: #2a0a0a; }
        .grade-F { background: linear-gradient(135deg, #f44336, #e53935); color: #fff; }
        .overall-text { font-size: 1.1rem; color: #ccc; }
        .overall-detail { font-size: 0.9rem; color: #888; margin-top: 4px; }

        /* RS Rating */
        .rs-card { background: #1a1a2e; border-radius: 16px; padding: 18px; margin-bottom: 16px; border: 1px solid #2a2a3e; }
        .rs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .rs-title { font-size: 0.9rem; font-weight: 700; color: #aaa; }
        .rs-composite { font-size: 1.5rem; font-weight: 800; }
        .rs-label { font-size: 0.8rem; color: #aaa; margin-left: 8px; }
        .rs-bars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .rs-bar-item { text-align: center; }
        .rs-bar-period { font-size: 0.72rem; color: #888; margin-bottom: 4px; }
        .rs-bar-track { height: 4px; background: #2a2a3e; border-radius: 2px; overflow: hidden; }
        .rs-bar-fill { height: 100%; border-radius: 2px; }
        .rs-bar-val { font-size: 0.78rem; font-weight: 600; margin-top: 3px; }

        /* 투자자 카드 */
        .investor-card { background: #1a1a2e; border-radius: 16px; margin-bottom: 14px; border: 1px solid #2a2a3e; overflow: hidden; }
        .investor-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; cursor: pointer; user-select: none; transition: background 0.2s; }
        .investor-header:hover { background: #222240; }
        .investor-left { display: flex; align-items: center; gap: 12px; }
        .investor-icon { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; color: #fff; }
        .icon-buffett { background: linear-gradient(135deg, #4a148c, #7b1fa2); }
        .icon-graham { background: linear-gradient(135deg, #1a237e, #283593); }
        .icon-lynch { background: linear-gradient(135deg, #004d40, #00695c); }
        .icon-oneil { background: linear-gradient(135deg, #e65100, #f57c00); }
        .icon-fisher { background: linear-gradient(135deg, #b71c1c, #d32f2f); }
        .investor-name { font-weight: 600; font-size: 1rem; }
        .investor-sub { font-size: 0.8rem; color: #888; }
        .investor-right { display: flex; align-items: center; gap: 12px; }
        .pass-rate { font-size: 0.85rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
        .rate-high { background: #0a3a0a; color: #4caf50; }
        .rate-mid { background: #3a3a0a; color: #ffeb3b; }
        .rate-low { background: #3a0a0a; color: #f44336; }
        .arrow { color: #666; transition: transform 0.3s; font-size: 0.8rem; }
        .arrow.open { transform: rotate(180deg); }
        .criteria-list { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .criteria-list.open { max-height: 700px; }
        .criteria-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-top: 1px solid #1e1e35; }
        .criteria-item:hover { background: #1e1e35; }
        .criteria-name { font-size: 0.88rem; flex: 1; }
        .criteria-value { font-size: 0.83rem; color: #aaa; margin: 0 12px; text-align: right; min-width: 80px; }
        .badge { padding: 3px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; min-width: 50px; text-align: center; }
        .badge-yes { background: #0a3a0a; color: #4caf50; }
        .badge-no { background: #3a0a0a; color: #f44336; }
        .badge-na { background: #2a2a2a; color: #666; }
        .progress-bar { height: 4px; background: #2a2a3e; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

        /* 재무 추세 */
        .chart-card { background: #1a1a2e; border-radius: 16px; padding: 18px; margin-bottom: 16px; border: 1px solid #2a2a3e; }
        .chart-title { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; font-weight: 600; }
        .chart-canvas-wrap { position: relative; height: 180px; }
        .cagr-row { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
        .cagr-pill { background: #0f0f1a; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; color: #aaa; }
        .cagr-pill b { color: #fff; }

        /* 품질 카드 */
        .quality-card { background: #1a1a2e; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #2a2a3e; }
        .quality-score-wrap { text-align: center; margin-bottom: 16px; }
        .quality-score-val { font-size: 2.4rem; font-weight: 800; }
        .quality-score-label { font-size: 0.85rem; color: #888; }
        .quality-bar-track { height: 8px; background: #2a2a3e; border-radius: 4px; overflow: hidden; margin: 10px auto; max-width: 300px; }
        .quality-bar-fill { height: 100%; border-radius: 4px; }
        .quality-section { margin-top: 16px; }
        .quality-section h4 { font-size: 0.85rem; margin-bottom: 8px; color: #aaa; }
        .quality-section ul { list-style: none; padding: 0; }
        .quality-section li { padding: 6px 10px; margin-bottom: 4px; border-radius: 8px; font-size: 0.82rem; }
        .qs-strength li { background: #0a2a14; color: #aed581; border-left: 3px solid #4caf50; }
        .qs-flag li { background: #2a1010; color: #ef9a9a; border-left: 3px solid #f44336; }
        .quality-metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 12px; font-size: 0.78rem; }
        .quality-metric { background: #0f0f1a; padding: 8px 12px; border-radius: 8px; }
        .qm-label { color: #888; font-size: 0.72rem; }
        .qm-value { color: #fff; font-weight: 600; margin-top: 2px; }

        .disclaimer { text-align: center; color: #555; font-size: 0.75rem; padding: 20px 0; line-height: 1.6; }

        .quick-search { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .quick-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #2a2a3e; background: transparent; color: #aaa; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .quick-btn:hover { border-color: #7b2ff7; color: #fff; }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.4rem; }
            .stock-name { font-size: 1.2rem; }
            .criteria-value { min-width: 60px; font-size: 0.78rem; }
            .search-box button { padding: 14px 18px; }
            .fg-gauge-wrap { width: 180px; height: 100px; }
            .fg-gauge-bg { width: 180px; height: 180px; }
            .fg-needle { height: 65px; }
            .fg-scale { max-width: 180px; }
            .tab-btn { font-size: 0.7rem; padding: 10px 2px; min-width: 70px; }
            .opt-summary, .fv-grid { grid-template-columns: 1fr; }
            .verdict-card { flex-direction: column; text-align: center; gap: 12px; }
            .verdict-badge { min-width: auto; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Stock Screener</h1>
            <p>시장 방향 · RS · 적정주가 · 재무품질 · 투자자 5인 기준</p>
        </div>

        <div class="search-wrap">
            <div class="search-box">
                <input type="text" id="tickerInput" placeholder="종목명 또는 티커 (예: 애플, 삼성전자, NVDA)" autocomplete="off">
                <button id="searchBtn" onclick="analyze()">분석</button>
            </div>
            <div class="autocomplete" id="autocomplete"></div>
        </div>

        <div class="quick-search">
            <button class="quick-btn" onclick="quickSearch('AAPL')">AAPL</button>
            <button class="quick-btn" onclick="quickSearch('MSFT')">MSFT</button>
            <button class="quick-btn" onclick="quickSearch('삼성전자')">삼성전자</button>
            <button class="quick-btn" onclick="quickSearch('TSLA')">TSLA</button>
            <button class="quick-btn" onclick="quickSearch('NVDA')">NVDA</button>
            <button class="quick-btn" onclick="quickSearch('카카오')">카카오</button>
            <button class="quick-btn" onclick="quickSearch('NVAX')">NVAX</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>데이터 분석 중...</p>
        </div>
        <div class="error-msg" id="errorMsg"></div>

        <div id="results">
            <div id="marketBanner"></div>
            <div id="verdictCard"></div>
            <div id="dataWarnings"></div>
            <div class="stock-card" id="stockCard"></div>
            <div id="fvCard"></div>
            <div id="rsCard"></div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('sentiment')">심리</button>
                <button class="tab-btn" onclick="switchTab('positions')">숏/롱</button>
                <button class="tab-btn" onclick="switchTab('options')">옵션</button>
                <button class="tab-btn" onclick="switchTab('investors')">투자자</button>
                <button class="tab-btn" onclick="switchTab('trend')">재무 추세</button>
            </div>

            <div class="tab-content active" id="tab-sentiment"><div class="fg-card" id="fgCard"></div></div>
            <div class="tab-content" id="tab-positions"><div class="pos-card" id="posCard"></div></div>
            <div class="tab-content" id="tab-options"><div class="opt-card" id="optCard"></div></div>
            <div class="tab-content" id="tab-investors">
                <div class="overall-card" id="overallCard"></div>
                <div id="investorCards"></div>
            </div>
            <div class="tab-content" id="tab-trend">
                <div id="qualityCard"></div>
                <div id="trendCharts"></div>
            </div>

            <div class="disclaimer">
                Yahoo Finance 데이터 기반 | 투자 참고용이며 투자 권유가 아닙니다<br>
                재무제표는 가장 최근 분기 기준 | 실시간 주가는 15분 지연
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('tickerInput');
        const btn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const results = document.getElementById('results');
        const acBox = document.getElementById('autocomplete');
        let acTimeout = null;
        let acIndex = -1;
        let chartInstances = [];
        let currentTicker = null;
        let optionsLoaded = false;

        input.addEventListener('keydown', (e) => {
            const items = acBox.querySelectorAll('.ac-item');
            if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex + 1, items.length - 1); items.forEach((el, i) => el.classList.toggle('selected', i === acIndex)); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(acIndex - 1, -1); items.forEach((el, i) => el.classList.toggle('selected', i === acIndex)); }
            else if (e.key === 'Enter') { if (acIndex >= 0 && items[acIndex]) items[acIndex].click(); else { acBox.classList.remove('show'); analyze(); } }
            else if (e.key === 'Escape') acBox.classList.remove('show');
        });

        input.addEventListener('input', () => {
            clearTimeout(acTimeout);
            const q = input.value.trim();
            if (q.length < 1) { acBox.classList.remove('show'); return; }
            acTimeout = setTimeout(() => searchAutocomplete(q), 250);
        });

        document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) acBox.classList.remove('show'); });

        async function searchAutocomplete(q) {
            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                if (data.length === 0) { acBox.classList.remove('show'); return; }
                acIndex = -1;
                acBox.innerHTML = data.map(item => {
                    const sub = [item.sector || '', item.engName || ''].filter(Boolean).join(' · ');
                    return `
                        <div class="ac-item" data-symbol="${item.symbol}">
                            <div>
                                <div class="ac-name">${item.name}</div>
                                ${sub ? `<div class="ac-sub">${sub}</div>` : ''}
                            </div>
                            <div class="ac-right">
                                <span class="ac-symbol">${item.symbol}</span>
                                <span class="ac-exchange">${item.exchange || ''}</span>
                            </div>
                        </div>`;
                }).join('');
                acBox.querySelectorAll('.ac-item').forEach(el => {
                    el.addEventListener('click', () => { input.value = el.dataset.symbol; acBox.classList.remove('show'); analyze(); });
                });
                acBox.classList.add('show');
            } catch (e) {}
        }

        function quickSearch(ticker) { input.value = ticker; acBox.classList.remove('show'); analyze(); }

        function switchTab(tab) {
            const tabs = ['sentiment', 'positions', 'options', 'investors', 'trend'];
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', tabs[i] === tab));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            if (tab === 'options' && !optionsLoaded && currentTicker) loadOptionsLazy();
        }

        async function loadOptionsLazy() {
            optionsLoaded = true;
            const el = document.getElementById('optCard');
            el.innerHTML = `<div style="text-align:center;padding:40px;color:#888;"><div class="spinner" style="margin:0 auto 12px;"></div>옵션 체인 로딩...</div>`;
            try {
                const res = await fetch('/api/options', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ticker: currentTicker }) });
                const opt = await res.json();
                renderOptions(opt);
            } catch (e) {
                el.innerHTML = `<div style="color:#888;padding:40px;text-align:center;">옵션 데이터 로드 실패</div>`;
                optionsLoaded = false;
            }
        }

        async function analyze() {
            const query = input.value.trim();
            if (!query) return;
            btn.disabled = true;
            loading.style.display = 'block';
            errorMsg.style.display = 'none';
            results.style.display = 'none';
            chartInstances.forEach(c => { try { c.destroy(); } catch(e){} });
            chartInstances = [];
            optionsLoaded = false;
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker: query })
                });
                const data = await res.json();
                if (!res.ok) { errorMsg.textContent = data.error; errorMsg.style.display = 'block'; return; }
                renderResults(data);
                results.style.display = 'block';
            } catch (err) {
                errorMsg.textContent = '서버 연결에 실패했습니다.';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function getFgColor(s) { if (s >= 75) return '#2e7d32'; if (s >= 55) return '#66bb6a'; if (s >= 45) return '#ffeb3b'; if (s >= 25) return '#ff9800'; return '#e53935'; }
        function getBarColor(s) { if (s >= 60) return '#4caf50'; if (s >= 40) return '#ffeb3b'; return '#f44336'; }

        function renderResults(data) {
            currentTicker = data.ticker;
            renderMarketBanner(data.marketRegime);
            renderVerdict(data.verdict);
            renderDataWarnings(data.dataWarnings);
            document.getElementById('stockCard').innerHTML = `
                <div class="stock-name">${data.stock.name}<span class="stock-ticker">${data.ticker}</span></div>
                <div class="stock-meta">
                    <span>${data.stock.sector}</span>
                    <span>${data.stock.industry}</span>
                    <span>${data.stock.price}</span>
                    <span>시총 ${data.stock.marketCap}</span>
                </div>`;
            renderFairValue(data.fairValue);
            renderRSRating(data.rsRating);
            renderFearGreed(data.fearGreed);
            renderPositions(data.positions);
            if (data.options && data.options.lazy) {
                document.getElementById('optCard').innerHTML = `<div style="color:#888;padding:40px;text-align:center;">옵션 탭을 클릭하면 데이터를 불러옵니다.</div>`;
            } else {
                renderOptions(data.options);
            }
            renderOverall(data.overall);
            renderInvestors(data.investors);
            renderQuality(data.quality);
            renderTrendCharts(data.history);
        }

        function renderMarketBanner(m) {
            const el = document.getElementById('marketBanner');
            if (!m || !m.available) { el.innerHTML = ''; return; }
            const cls = m.passed_canslim_m ? 'mb-up' : (m.direction.includes('하락') || m.direction.includes('조정')) ? 'mb-down' : 'mb-flat';
            el.innerHTML = `
                <div class="market-banner">
                    <div class="mb-left">
                        <div class="mb-dot ${cls}"></div>
                        <div>
                            <div class="mb-label">${m.benchmark_name}: ${m.direction}</div>
                            <div class="mb-sub">${m.recommend}</div>
                        </div>
                    </div>
                    <div class="mb-right">
                        MA50 ${m.ma50_pct >= 0 ? '+' : ''}${m.ma50_pct}%<br>
                        MA200 ${m.ma200_pct >= 0 ? '+' : ''}${m.ma200_pct}%
                    </div>
                </div>`;
        }

        function renderVerdict(v) {
            const el = document.getElementById('verdictCard');
            if (!v) { el.innerHTML = ''; return; }
            const cls = v.color === 'green' ? 'verdict-green' : v.color === 'red' ? 'verdict-red' : 'verdict-yellow';
            const badgeCls = v.color === 'green' ? 'vb-green' : v.color === 'red' ? 'vb-red' : 'vb-yellow';
            const reasonsHTML = v.reasons.length ? `<ul class="verdict-reasons">${v.reasons.map(r => `<li>• ${r}</li>`).join('')}</ul>` : '';
            const warnsHTML = v.warnings && v.warnings.length ? `<div class="verdict-warnings">⚠ ${v.warnings.join(' · ')}</div>` : '';
            el.innerHTML = `
                <div class="verdict-card ${cls}">
                    <div class="verdict-badge ${badgeCls}">${v.decision}</div>
                    <div class="verdict-content">${reasonsHTML}${warnsHTML}</div>
                </div>`;
        }

        function renderDataWarnings(warnings) {
            const el = document.getElementById('dataWarnings');
            if (!warnings || warnings.length === 0) { el.innerHTML = ''; return; }
            el.innerHTML = `<div class="data-warning">⚠ 일부 데이터 누락: ${warnings.join(', ')}</div>`;
        }

        function renderFairValue(fv) {
            const el = document.getElementById('fvCard');
            if (!fv || !fv.available) {
                if (fv && fv.quality_class) {
                    const qc = fv.quality_class;
                    el.innerHTML = `<div class="fv-card"><div class="section-title" style="margin-top:0;">적정주가 추정 불가</div><div style="padding:12px;color:#ff9800;">카테고리: ${qc.label}<br><small style="color:#aaa;">${qc.note}</small></div></div>`;
                } else { el.innerHTML = ''; }
                return;
            }
            let cls = 'fv-fair';
            if (fv.upside_pct >= 10) cls = 'fv-up';
            else if (fv.upside_pct <= -10) cls = 'fv-down';
            const fmtUp = (p) => p == null ? '' : `<span style="color:${p>=0?'#4caf50':'#f44336'};font-size:0.72rem;">(${p>=0?'+':''}${p}%)</span>`;
            const dcfStr = fv.dcf ? `$${fv.dcf.fair_value} ${fmtUp(fv.dcf.upside_pct)}` : '<span style="color:#666;">제외</span>';
            const perStr = fv.per_based ? `$${fv.per_based.fair_value} ${fmtUp(fv.per_based.upside_pct)}` : '<span style="color:#666;">제외</span>';
            const grahamStr = fv.graham_number ? `$${fv.graham_number}` : '<span style="color:#666;">제외</span>';
            const analystStr = fv.analyst_target ? `$${fv.analyst_target.fair_value} ${fmtUp(fv.analyst_target.upside_pct)}` : '<span style="color:#666;">—</span>';
            const psStr = fv.ps_based ? `$${fv.ps_based.fair_value} ${fmtUp(fv.ps_based.upside_pct)}` : null;

            const weights = fv.weights_used || {};
            const weightLabels = {dcf: 'DCF', per_based: 'PER', graham_number: 'Graham', analyst_target: '애널', ps_based: 'P/S'};
            const weightText = Object.keys(weights).length
                ? Object.entries(weights).map(([k, w]) => `${weightLabels[k]||k} ${Math.round(w*100)}%`).join(' · ')
                : '';

            const qc = fv.quality_class || {};
            const confCol = qc.confidence === 'high' ? '#4caf50' : qc.confidence === 'medium' ? '#ffeb3b' : '#f44336';
            const catBadge = qc.label
                ? `<div style="display:inline-block;padding:3px 10px;border-radius:12px;background:${confCol}22;color:${confCol};font-size:0.72rem;font-weight:600;margin-left:8px;">${qc.label}</div>`
                : '';
            const warningsHTML = qc.warnings && qc.warnings.length
                ? `<div style="background:#2a2410;border-left:3px solid #ff9800;padding:8px 12px;margin-top:10px;border-radius:6px;font-size:0.75rem;color:#ffb74d;">${qc.warnings.map(w=>`⚠ ${w}`).join('<br>')}</div>`
                : '';
            const noteHTML = qc.note
                ? `<div style="text-align:center;font-size:0.72rem;color:#888;margin-top:6px;font-style:italic;">${qc.note}</div>`
                : '';
            const excludedHTML = fv.excluded_methods && fv.excluded_methods.length
                ? `<details style="margin-top:8px;font-size:0.72rem;color:#888;"><summary style="cursor:pointer;">제외된 평가법 ${fv.excluded_methods.length}개</summary><ul style="padding-left:18px;margin-top:4px;">${fv.excluded_methods.map(e=>`<li>${e.method}: ${e.reason}</li>`).join('')}</ul></details>`
                : '';

            const extraPSRow = psStr ? `<div class="fv-box"><div class="fv-box-label">P/S 기반 (매출 배수)</div><div class="fv-box-value">${psStr}</div></div>` : '';

            el.innerHTML = `
                <div class="fv-card">
                    <div class="section-title" style="margin-top:0;">적정주가 추정 <span style="font-size:0.7rem;font-weight:400;color:#888;">(${fv.sector || '?'} 섹터)</span>${catBadge}</div>
                    <div class="fv-grid">
                        <div class="fv-box"><div class="fv-box-label">현재가</div><div class="fv-box-value">$${fv.current_price}</div></div>
                        <div class="fv-box"><div class="fv-box-label">종합 적정가</div><div class="fv-box-value">$${fv.composite_fair_value}</div><div class="fv-box-sub">${fv.upside_pct >= 0 ? '+' : ''}${fv.upside_pct}%</div></div>
                        <div class="fv-box"><div class="fv-box-label">DCF ${fv.dcf ? `(성장률 ${(fv.dcf.assumptions.growth_5y*100).toFixed(0)}%)` : ''}</div><div class="fv-box-value">${dcfStr}</div></div>
                        <div class="fv-box"><div class="fv-box-label">PER 기반 ${fv.per_based ? `(PE ${fv.per_based.assumption_pe})` : ''}</div><div class="fv-box-value">${perStr}</div></div>
                        <div class="fv-box"><div class="fv-box-label">애널리스트${fv.analyst_target && fv.analyst_target.num_analysts ? ` (${fv.analyst_target.num_analysts}명)` : ''}</div><div class="fv-box-value">${analystStr}</div></div>
                        <div class="fv-box"><div class="fv-box-label">Graham</div><div class="fv-box-value">${grahamStr}</div></div>
                        ${extraPSRow}
                    </div>
                    ${weightText ? `<div style="text-align:center;font-size:0.72rem;color:#666;margin-top:8px;">가중치: ${weightText}</div>` : ''}
                    ${warningsHTML}
                    ${noteHTML}
                    <div class="fv-verdict ${cls}">${fv.verdict}</div>
                    ${excludedHTML}
                </div>`;
        }

        function renderRSRating(rs) {
            const el = document.getElementById('rsCard');
            if (!rs || !rs.available) { el.innerHTML = ''; return; }
            const periods = [
                {key: 'rs_1m', label: '1M'},
                {key: 'rs_3m', label: '3M'},
                {key: 'rs_6m', label: '6M'},
                {key: 'rs_12m', label: '12M'},
            ];
            const compColor = rs.rs_composite >= 80 ? '#4caf50' : rs.rs_composite >= 60 ? '#8bc34a' : rs.rs_composite >= 40 ? '#ffeb3b' : '#f44336';
            const bars = periods.map(p => {
                const v = rs[p.key];
                if (v == null) return `<div class="rs-bar-item"><div class="rs-bar-period">${p.label}</div><div class="rs-bar-track"></div><div class="rs-bar-val">—</div></div>`;
                const col = v >= 80 ? '#4caf50' : v >= 60 ? '#8bc34a' : v >= 40 ? '#ffeb3b' : '#f44336';
                return `<div class="rs-bar-item"><div class="rs-bar-period">${p.label}</div><div class="rs-bar-track"><div class="rs-bar-fill" style="width:${v}%;background:${col};"></div></div><div class="rs-bar-val" style="color:${col};">${v}</div></div>`;
            }).join('');
            el.innerHTML = `
                <div class="rs-card">
                    <div class="rs-header">
                        <div class="rs-title">RS Rating (${rs.benchmark} 대비)</div>
                        <div><span class="rs-composite" style="color:${compColor};">${rs.rs_composite ?? '—'}</span><span class="rs-label">${rs.label}</span></div>
                    </div>
                    <div class="rs-bars">${bars}</div>
                </div>`;
        }

        function renderFearGreed(fg) {
            if (!fg || fg.score === null) { document.getElementById('fgCard').innerHTML = `<div style="color:#888;padding:40px;">공포/탐욕 지수 데이터 부족</div>`; return; }
            const angle = (fg.score / 100) * 180 - 90;
            const color = getFgColor(fg.score);
            let indHTML = '';
            fg.indicators.forEach(ind => {
                indHTML += `<div class="fg-ind-item">
                    <div class="fg-ind-name">${ind.name}</div>
                    <div class="fg-ind-value">${ind.value}</div>
                    <div class="fg-ind-bar-wrap"><div class="fg-ind-bar" style="width:${ind.score}%;background:${getBarColor(ind.score)};"></div></div>
                    <div class="fg-ind-label">${ind.label}</div>
                </div>`;
            });
            document.getElementById('fgCard').innerHTML = `
                <div class="fg-gauge-wrap"><div class="fg-gauge-bg"></div><div class="fg-needle" id="fgNeedle" style="transform:rotate(-90deg);"></div></div>
                <div class="fg-scale"><span>극단적 공포</span><span>극단적 탐욕</span></div>
                <div class="fg-score" style="color:${color}">${fg.score}</div>
                <div class="fg-label" style="color:${color}">${fg.label}</div>
                <div class="fg-indicators">${indHTML}</div>`;
            setTimeout(() => { const n = document.getElementById('fgNeedle'); if (n) n.style.transform = `rotate(${angle}deg)`; }, 100);
        }

        function renderPositions(pos) {
            if (!pos) return;
            let sentBg, sentColor;
            if (pos.sentiment.includes('약세')) { sentBg = '#2a1a1a'; sentColor = '#f44336'; }
            else if (pos.sentiment.includes('강세')) { sentBg = '#0a2a0a'; sentColor = '#4caf50'; }
            else { sentBg = '#2a2a1a'; sentColor = '#ffeb3b'; }
            if (pos.short.length === 0 && pos.long.length === 0) { document.getElementById('posCard').innerHTML = `<div style="color:#888;padding:40px;text-align:center;">포지션 데이터가 없습니다.</div>`; return; }
            let html = `<div class="pos-sentiment" style="background:${sentBg}"><div class="pos-sentiment-label" style="color:${sentColor}">${pos.sentiment}</div><div class="pos-sentiment-detail">${pos.sentimentDetail}</div></div>`;
            if (pos.short.length > 0) { html += `<div class="pos-section-title">공매도 (Short)</div>`; pos.short.forEach(s => { html += `<div class="pos-item"><span class="pos-item-name">${s.name}</span><span class="pos-item-value">${s.value}</span></div>`; }); }
            if (pos.long.length > 0) { html += `<div class="pos-section-title">보유 현황 (Long)</div>`; pos.long.forEach(l => { html += `<div class="pos-item"><span class="pos-item-name">${l.name}</span><span class="pos-item-value">${l.value}</span></div>`; }); }
            document.getElementById('posCard').innerHTML = html;
        }

        function renderOptions(opt) {
            if (!opt || !opt.available) { document.getElementById('optCard').innerHTML = `<div style="color:#888;padding:40px;text-align:center;">옵션 데이터가 없습니다. (한국 주식은 옵션 데이터 미제공)</div>`; return; }
            const pcrColor = opt.pcrOI >= 1.0 ? '#f44336' : opt.pcrOI >= 0.7 ? '#ffeb3b' : '#4caf50';
            let html = `
                <div style="text-align:center;color:#888;font-size:0.8rem;margin-bottom:16px;">만기일: ${opt.expDate} | 현재가: $${opt.currentPrice}</div>
                <div class="opt-summary">
                    <div class="opt-box">
                        <div class="opt-box-label">Put/Call 비율 (미결제약정)</div>
                        <div class="opt-box-value" style="color:${pcrColor}">${opt.pcrOI ?? 'N/A'}</div>
                        <div style="font-size:0.75rem;color:#888;margin-top:4px;">${opt.pcrLabel}</div>
                    </div>
                    <div class="opt-box">
                        <div class="opt-box-label">거래량 비교</div>
                        <div style="font-size:0.85rem;margin-top:8px;"><span style="color:#4caf50;">콜 ${opt.totalCallVol.toLocaleString()}</span> / <span style="color:#f44336;">풋 ${opt.totalPutVol.toLocaleString()}</span></div>
                        <div style="font-size:0.85rem;margin-top:4px;"><span style="color:#4caf50;">콜OI ${opt.totalCallOI.toLocaleString()}</span> / <span style="color:#f44336;">풋OI ${opt.totalPutOI.toLocaleString()}</span></div>
                    </div>
                </div>
                <div class="opt-maxpain"><div class="opt-maxpain-label">Max Pain (옵션 만기 시 예상 수렴 가격)</div><div class="opt-maxpain-value">$${opt.maxPain}</div><div class="opt-maxpain-desc">${opt.maxPainDesc}</div></div>`;
            if (opt.putOITop.length > 0) {
                const maxOI = Math.max(...opt.putOITop.map(p => p.oi));
                html += `<div class="pos-section-title">풋옵션 미결제약정 TOP</div>`;
                opt.putOITop.forEach(p => {
                    const pct = (p.oi / maxOI * 100);
                    html += `<div class="opt-strike-item"><div class="opt-strike-price" style="color:#f44336;">$${p.strike}</div><div class="opt-strike-bar-wrap"><div class="opt-strike-bar" style="width:${pct}%;background:#f44336;"></div></div><div class="opt-strike-oi">${p.oi.toLocaleString()}</div><div class="opt-strike-desc">${p.desc}</div></div>`;
                });
            }
            if (opt.callOITop.length > 0) {
                const maxOI = Math.max(...opt.callOITop.map(c => c.oi));
                html += `<div class="pos-section-title" style="margin-top:20px;">콜옵션 미결제약정 TOP</div>`;
                opt.callOITop.forEach(c => {
                    const pct = (c.oi / maxOI * 100);
                    html += `<div class="opt-strike-item"><div class="opt-strike-price" style="color:#4caf50;">$${c.strike}</div><div class="opt-strike-bar-wrap"><div class="opt-strike-bar" style="width:${pct}%;background:#4caf50;"></div></div><div class="opt-strike-oi">${c.oi.toLocaleString()}</div><div class="opt-strike-desc">${c.desc}</div></div>`;
                });
            }
            html += `<div style="margin-top:20px;padding:16px;background:#0f0f1a;border-radius:12px;font-size:0.8rem;color:#888;line-height:1.8;"><strong style="color:#aaa;">읽는 법</strong><br><span style="color:#f44336;">풋옵션</span>: 해당 가격 아래로 떨어질 것이라는 베팅<br><span style="color:#4caf50;">콜옵션</span>: 해당 가격 위로 올라갈 것이라는 베팅<br><span style="color:#7b2ff7;">Max Pain</span>: 옵션 만기일 수렴 예상 가격<br><strong>P/C > 1.0</strong>: 하락 베팅 우세 | <strong>< 0.7</strong>: 상승 베팅 우세</div>`;
            document.getElementById('optCard').innerHTML = html;
        }

        function renderOverall(o) {
            if (!o) return;
            document.getElementById('overallCard').innerHTML = `<div class="grade-circle grade-${o.grade}">${o.grade}</div><div class="overall-text">${o.gradeText} (${o.rate}%)</div><div class="overall-detail">${o.yes}/${o.total} 기준 통과</div>`;
        }

        function renderInvestors(investors) {
            const icons = { buffett: 'B', graham: 'G', lynch: 'L', oneil: 'O', fisher: 'F' };
            let html = '';
            investors.forEach((inv, i) => {
                const rc = inv.rate >= 70 ? 'rate-high' : inv.rate >= 40 ? 'rate-mid' : 'rate-low';
                const pc = inv.rate >= 70 ? '#4caf50' : inv.rate >= 40 ? '#ffeb3b' : '#f44336';
                let cHTML = '';
                inv.criteria.forEach(c => {
                    let bc, bt;
                    if (c.passed === true) { bc = 'badge-yes'; bt = 'YES'; }
                    else if (c.passed === false) { bc = 'badge-no'; bt = 'NO'; }
                    else { bc = 'badge-na'; bt = 'N/A'; }
                    cHTML += `<div class="criteria-item"><div class="criteria-name">${c.name}</div><div class="criteria-value">${c.value}</div><div class="badge ${bc}">${bt}</div></div>`;
                });
                html += `
                    <div class="investor-card">
                        <div class="investor-header" onclick="toggleCard(${i})">
                            <div class="investor-left">
                                <div class="investor-icon icon-${inv.icon}">${icons[inv.icon]}</div>
                                <div><div class="investor-name">${inv.name}</div><div class="investor-sub">${inv.sub}</div></div>
                            </div>
                            <div class="investor-right">
                                <span class="pass-rate ${rc}">${inv.yes}/${inv.total} (${inv.rate}%)</span>
                                <span class="arrow" id="arrow-${i}">&#9660;</span>
                            </div>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${inv.rate}%;background:${pc};"></div></div>
                        <div class="criteria-list" id="criteria-${i}">${cHTML}</div>
                    </div>`;
            });
            document.getElementById('investorCards').innerHTML = html;
        }

        function toggleCard(i) { document.getElementById(`criteria-${i}`).classList.toggle('open'); document.getElementById(`arrow-${i}`).classList.toggle('open'); }

        function renderQuality(q) {
            const el = document.getElementById('qualityCard');
            if (!q || !q.available) { el.innerHTML = ''; return; }
            const qs = q.quality_score ?? 0;
            const col = qs >= 70 ? '#4caf50' : qs >= 50 ? '#ffeb3b' : '#f44336';
            const strengthsHTML = q.strengths && q.strengths.length ? `<div class="quality-section qs-strength"><h4>✓ 강점</h4><ul>${q.strengths.map(s => `<li>${s}</li>`).join('')}</ul></div>` : '';
            const flagsHTML = q.flags && q.flags.length ? `<div class="quality-section qs-flag"><h4>⚠ 위험신호</h4><ul>${q.flags.map(f => `<li>${f}</li>`).join('')}</ul></div>` : '';
            const metrics = [
                {label: 'FCF / 순이익', v: q.fcf_ni_ratio},
                {label: '발생액 비율', v: q.accruals_ratio},
                {label: '매출채권 - 매출 증가율', v: q.ar_growth_vs_rev},
                {label: '재고 - 매출 증가율', v: q.inventory_growth_vs_rev},
            ].filter(m => m.v !== null && m.v !== undefined);
            const metricsHTML = metrics.length ? `<div class="quality-metrics">${metrics.map(m => `<div class="quality-metric"><div class="qm-label">${m.label}</div><div class="qm-value">${m.v}</div></div>`).join('')}</div>` : '';
            el.innerHTML = `
                <div class="quality-card">
                    <div class="section-title" style="margin-top:0;">재무 품질 (Earnings Quality)</div>
                    <div class="quality-score-wrap">
                        <div class="quality-score-val" style="color:${col};">${qs}<span style="font-size:1rem;color:#666;">/100</span></div>
                        <div class="quality-bar-track"><div class="quality-bar-fill" style="width:${qs}%;background:${col};"></div></div>
                        <div class="quality-score-label">품질 점수</div>
                    </div>
                    ${strengthsHTML}${flagsHTML}${metricsHTML}
                </div>`;
        }

        function renderTrendCharts(h) {
            const el = document.getElementById('trendCharts');
            if (!h || !h.available) { el.innerHTML = `<div style="color:#888;padding:40px;text-align:center;">재무제표 추이 데이터가 부족합니다.</div>`; return; }
            const bc = h.roe_consistency || {};
            const cagrHTML = `
                <div class="cagr-row">
                    ${h.revenue_cagr != null ? `<div class="cagr-pill">매출 CAGR <b>${(h.revenue_cagr*100).toFixed(1)}%</b></div>` : ''}
                    ${h.eps_cagr != null ? `<div class="cagr-pill">EPS CAGR <b>${(h.eps_cagr*100).toFixed(1)}%</b></div>` : ''}
                    ${bc.passed_buffett_10yr_proxy ? `<div class="cagr-pill" style="color:#4caf50;">✓ ROE 꾸준히 15%+ (${bc.years_above_15pct}/${bc.total_measured}년)</div>` : bc.total_measured ? `<div class="cagr-pill">ROE 15%+ ${bc.years_above_15pct}/${bc.total_measured}년</div>` : ''}
                </div>`;
            el.innerHTML = `
                <div class="chart-card"><div class="chart-title">매출 (Revenue)</div><div class="chart-canvas-wrap"><canvas id="chRevenue"></canvas></div></div>
                <div class="chart-card"><div class="chart-title">순이익 (Net Income)</div><div class="chart-canvas-wrap"><canvas id="chNetIncome"></canvas></div></div>
                <div class="chart-card"><div class="chart-title">EPS (주당순이익)</div><div class="chart-canvas-wrap"><canvas id="chEPS"></canvas></div></div>
                <div class="chart-card"><div class="chart-title">ROE (%)</div><div class="chart-canvas-wrap"><canvas id="chROE"></canvas></div></div>
                <div class="chart-card"><div class="chart-title">FCF (Free Cash Flow)</div><div class="chart-canvas-wrap"><canvas id="chFCF"></canvas></div></div>
                ${cagrHTML}`;
            const toM = arr => arr.map(v => v == null ? null : v / 1e6);
            const toPct = arr => arr.map(v => v == null ? null : v * 100);
            makeBarChart('chRevenue', h.years, toM(h.revenue), '#7b2ff7', '백만 $');
            makeBarChart('chNetIncome', h.years, toM(h.net_income), '#00d2ff', '백만 $');
            makeLineChart('chEPS', h.years, h.eps, '#4caf50', '$');
            makeLineChart('chROE', h.years, toPct(h.roe), '#ff9800', '%');
            makeBarChart('chFCF', h.years, toM(h.fcf), '#8bc34a', '백만 $');
        }

        function baseOpts(unit) {
            return {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => `${ctx.parsed.y != null ? ctx.parsed.y.toLocaleString(undefined, {maximumFractionDigits: 2}) : '—'} ${unit}` } } },
                scales: { x: { ticks: { color: '#888' }, grid: { color: '#2a2a3e' } }, y: { ticks: { color: '#888' }, grid: { color: '#2a2a3e' } } },
            };
        }

        function makeBarChart(id, labels, data, color, unit) {
            const ctx = document.getElementById(id); if (!ctx) return;
            const chart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ data, backgroundColor: color + '99', borderColor: color, borderWidth: 1 }] }, options: baseOpts(unit) });
            chartInstances.push(chart);
        }
        function makeLineChart(id, labels, data, color, unit) {
            const ctx = document.getElementById(id); if (!ctx) return;
            const chart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ data, borderColor: color, backgroundColor: color + '33', fill: true, tension: 0.25, pointBackgroundColor: color, pointRadius: 4 }] }, options: baseOpts(unit) });
            chartInstances.push(chart);
        }
    </script>
</body>
</html>
